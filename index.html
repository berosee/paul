<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mpplay - Extended List</title>
  <style>
    :root {
      --neon-blue: #00d2ff;
      --deep-blue: #4a7cff;
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Pretendard', sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .nav, .player-card, .playlist-wrapper {
      width: 92%;
      max-width: 360px;
    }

    /* 네비게이션 */
    .nav {
      display: flex; gap: 4px; margin: 12px 0;
      background: rgba(255,255,255,0.05); padding: 4px; border-radius: 50px;
    }
    .nav a {
      flex: 1; text-decoration: none; color: rgba(255, 255, 255, 0.4);
      padding: 8px 0; text-align: center; border-radius: 25px;
      font-size: 11px; font-weight: bold;
    }
    .nav a.active {
      background: var(--deep-blue); color: #fff;
      box-shadow: 0 0 10px var(--deep-blue);
    }

    /* 플레이어 카드 (슬림 버전) */
    .player-card {
      background: #0f172a;
      border-radius: 20px; padding: 20px 18px 15px 18px;
      text-align: center; border: 1px solid rgba(0, 210, 255, 0.2);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    .song-info .title { 
      font-size: 16px; font-weight: bold; margin-bottom: 15px; 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .status-row {
      display: flex; justify-content: center; align-items: center;
      gap: 12px; margin-bottom: 15px;
    }
    .time-display { font-size: 20px; font-family: 'Arial', sans-serif; color: #fff; font-weight: 300; }

    .bar-container { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
    .bar { width: 3px; background: var(--neon-blue); border-radius: 1px; height: 4px; }
    .bar.playing { animation: bounce 0.6s ease-in-out infinite alternate; }
    @keyframes bounce { from { height: 4px; } to { height: 16px; } }

    .progress-container { width: 100%; cursor: pointer; padding: 5px 0; margin-bottom: 12px; }
    .progress-bg { height: 2px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
    .progress-fill { width: 0%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }

    .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
    .btn { background: none; border: none; color: #4b5563; font-size: 20px; cursor: pointer; }
    .btn-play-box { 
      border: 1.5px solid #fff; border-radius: 10px;
      width: 50px; height: 45px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
      cursor: pointer;
    }
    .btn-play-box span { color: var(--neon-blue); font-size: 24px; }

    /* 리스트 영역 - 높이를 약 12곡 정도로 확장 */
    .playlist-wrapper { 
      flex: 1; 
      overflow-y: auto; 
      background: rgba(0,0,0,0.2); 
      border-radius: 15px 15px 0 0;
      /* 12곡이 보이도록 최소 높이 설정 (곡당 약 41px 기준) */
      max-height: 500px; 
    }
    .playlist-table { width: 100%; border-collapse: collapse; }
    .playlist-table td { 
      padding: 11px 18px; /* 간격을 살짝 줄여 더 많은 곡이 보이게 조정 */
      font-size: 14px; 
      border-bottom: 1px solid rgba(255,255,255,0.03); 
      color: #999; cursor: pointer; 
    }
    .playlist-table tr.active td { 
      color: var(--neon-blue); 
      font-weight: bold; 
      background: rgba(0,210,255,0.08); 
    }

    /* 스크롤바 디자인 (깔끔하게) */
    .playlist-wrapper::-webkit-scrollbar { width: 4px; }
    .playlist-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>

<div class="nav">

const params = new URLSearchParams(window.location.search);
const curCat = params.get("cat") || "old";
const curList = playlists[curCat] || playlists["old"];

document.getElementById("nav-" + curCat).classList.add("active");

const audio = new Audio();
let curIdx = 0;
let isLoaded = false; 

const listTable = document.getElementById("listTable");
curList.forEach((song, i) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${song.title}</td>`;
  tr.onclick = () => playSong(i);
  listTable.appendChild(tr);
});

function formatTime(sec) {
  if (!sec || isNaN(sec)) return "00:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
}

function playSong(i) {
  curIdx = i;
  isLoaded = true;
  audio.src = curList[curIdx].url;
  audio.play().catch(e => console.log("재생 오류"));
  document.getElementById("labelTitle").textContent = curList[curIdx].title;
  updateUI();
}

function updateUI() {
  const rows = document.querySelectorAll("#listTable tr");
  rows.forEach((row, k) => {
    if (k === curIdx) {
      row.classList.add("active");
      // 옵션 B: 화면에 가려질 때만 혹은 가장 적절한 위치로 스크롤
      row.scrollIntoView({
        behavior: 'smooth',
        block: 'center' // 현재 곡이 리스트의 중앙에 오도록 하여 위아래 곡을 확인하기 편하게 함
      });
    } else {
      row.classList.remove("active");
    }
  });
}

document.getElementById("btnPlayWrap").onclick = () => {
  if (!isLoaded) { playSong(0); } 
  else { audio.paused ? audio.play() : audio.pause(); }
};

audio.ontimeupdate = () => {
  if (audio.duration) {
    document.getElementById("curTime").textContent = formatTime(audio.currentTime);
    document.getElementById("durTime").textContent = formatTime(audio.duration);
    const per = (audio.currentTime / audio.duration) * 100;
    document.getElementById("progFill").style.width = per + "%";
  }
};

audio.onloadedmetadata = () => {
  document.getElementById("durTime").textContent = formatTime(audio.duration);
};

audio.onplay = () => {
  document.getElementById("btnIcon").textContent = "Ⅱ";
  document.querySelectorAll(".bar").forEach(b => b.classList.add("playing"));
};
audio.onpause = () => {
  document.getElementById("btnIcon").textContent = "▶";
  document.querySelectorAll(".bar").forEach(b => b.classList.remove("playing"));
};

audio.onended = () => document.getElementById("btnNext").click();
document.getElementById("btnNext").onclick = () => playSong((curIdx + 1) % curList.length);
document.getElementById("btnPrev").onclick = () => playSong((curIdx - 1 + curList.length) % curList.length);

document.getElementById("progArea").onclick = (e) => {
  if (audio.duration) {
    audio.currentTime = (e.offsetX / document.getElementById("progArea").clientWidth) * audio.duration;
  }
};
